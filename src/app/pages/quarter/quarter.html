<div class="container mt-4" *ngIf="quarter">

  <h1 class="text-center mb-2">{{ quarter.description }}</h1>

  <div class="d-flex align-items-center">

    <button class="btn btn-outline-primary me-2" (click)="prev()" [disabled]="startIndex === 0">◀</button>

    <div class="row flex-grow-1" *ngIf="visibleSprints.length > 0">
      <div class="col-md-4 mb-3" *ngFor="let sprint of visibleSprints">

        <a [routerLink]="['/sprints', sprint.id]" class="text-decoration-none">
          <app-card
            [title]="sprint.description"
            [subtitle]="sprint.coatends ? sprint.coatends + ' coatends' : 'Sem coatends'"
            [startDate]="sprint.startDate | date:'shortDate'"
            [endDate]="sprint.endDate | date:'shortDate'">
          </app-card>
        </a>

      </div>
    </div>

    <div class="flex-grow-1 text-center text-muted" *ngIf="visibleSprints.length === 0">
      <p>Nenhum sprint encontrado para este trimestre.</p>
    </div>

    <button class="btn btn-outline-primary ms-2" (click)="next()" [disabled]="startIndex + 3 >= (quarter.sprints?.length || 0)">▶</button>

  </div>

</div>
