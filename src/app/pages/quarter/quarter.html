<div class="container mt-4" *ngIf="quarter">

  <h1 class="text-center mb-2">{{ quarter.description }}</h1>

  <div class="d-flex align-items-center">

    <button class="btn btn-outline-primary me-2" (click)="prev()">◀</button>

    <div class="row flex-grow-1">
      <div class="col-md-4" *ngFor="let sprint of visibleSprints">


      </div>
    </div>

    <button class="btn btn-outline-primary ms-2" (click)="next()">▶</button>

  </div>

</div>
