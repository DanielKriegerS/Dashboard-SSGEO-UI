  <div class="container mt-4">
    <h1 class="text-center mb-2">Sprints</h1>

    <div class="d-flex align-items-center">

      <button class="btn btn-outline-primary me-2" (click)="prev()">◀</button>

      <div class="flex-grow-1">

          <ng-container *ngIf="!loading; else loadingState">
            <ng-container *ngIf="sprints.length > 0; else emptyState">
        
              <div class="row">
                <div class="col-md-4" *ngFor="let s of visible">
                  <a [routerLink]="['/sprints', s.id]" class="text-decoration-none">
                    <app-card
                      [title]="s.description"
                      [subtitle]="s.coatendsCount + ' coatends'"
                      [startDate]="s.startDate | date:'shortDate'"
                      [endDate]="s.endDate | date:'shortDate'">
                    </app-card>
                  </a>
                </div>
              </div>
            </ng-container>
          </ng-container>

          <ng-template #emptyState>
            <div class="text-center text-muted">
              <app-notfoundfallback [title]="'Sprint'"></app-notfoundfallback>
            </div>
          </ng-template>

          <ng-template #loadingState>
            <div class="text-center">
              <span class="spinner-border"></span>
            </div>
          </ng-template>

      </div>
      <button class="btn btn-outline-primary ms-2" (click)="next()">▶</button>

    </div>
  </div>

  <app-dynamicformcomponent
  title="Nova Sprint"
  [fields]="fields"
  [submitFn]="createSprint">
</app-dynamicformcomponent>
